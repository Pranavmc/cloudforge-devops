apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-api
  namespace: devops-api
  labels:
    app: devops-api
    version: v1
    environment: production
    managed-by: kubectl
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
  - host: devops-api.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devops-api
            port:
              number: 80
