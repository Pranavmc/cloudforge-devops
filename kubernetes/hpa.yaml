apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-api
  namespace: devops-api
  labels:
    app: devops-api
    version: v1
    environment: production
    managed-by: kubectl
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
