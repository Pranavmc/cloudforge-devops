apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: devops-api-monitor
  namespace: devops-api
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
    - devops-api
  selector:
    matchLabels:
      app: devops-api
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
