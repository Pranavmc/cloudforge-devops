apiVersion: v1
kind: Service
metadata:
  name: devops-api
  namespace: devops-api
  labels:
    app: devops-api
    version: v1
    environment: production
    managed-by: kubectl
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: devops-api
