---
- name: Install prerequisites for containerd
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  become: true

- name: Create /etc/apt/keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Download Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  become: true
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Set permissions on Docker GPG key
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'
  become: true

- name: Add Docker apt repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
  become: true

- name: Update apt cache
  apt:
    update_cache: yes
  become: true

- name: Install containerd.io
  apt:
    name: containerd.io
    state: present
  become: true

- name: Create /etc/containerd directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'
  become: true

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  become: true
  changed_when: true

- name: Set SystemdCgroup to true in containerd config
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  become: true
  notify: restart containerd

- name: Enable and start containerd service
  systemd:
    name: containerd
    enabled: yes
    state: started
  become: true
