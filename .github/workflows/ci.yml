# Required GitHub Secrets:
# (none)
name: CI Pipeline
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: Run ESLint
        working-directory: app
        run: npx eslint src/
      - name: Run tests with coverage
        working-directory: app
        run: npm test -- --coverage --ci
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
  security-scan:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run npm audit
        working-directory: app
        run: npm audit --audit-level=high || true
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version
      - name: Trivy filesystem scan
        run: trivy fs --exit-code 0 --severity HIGH,CRITICAL --no-progress app/
      - name: Setup Python for Checkov
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov on Terraform
        run: checkov -d terraform/ --framework terraform --quiet || true
  docker-build-test:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: app/
          push: false
          tags: devops-api:test-${{ github.sha }}
          load: true
      - name: Start container and test
        run: |
          docker run -d --name test-container -p 8080:8080 devops-api:test-${{ github.sha }}
          sleep 15
          curl -f http://localhost:8080/health || (docker logs test-container && exit 1)
          docker stop test-container
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version
      - name: Scan image with Trivy
        run: trivy image --exit-code 0 --severity CRITICAL --no-progress devops-api:test-${{ github.sha }}